<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Royal Auto CPM - Topluluk Sohbeti</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="logo">RAC</div>
      <div class="server-list"><div class="server-pill active">R</div></div>
      <div class="channels">
        <div class="section-title">KANALLAR</div>
        <button class="channel active" id="roomGenel"># genel</button>
        <button class="channel" id="roomSohbet"># sohbet</button>
      </div>
    </aside>

    <main class="chat-panel">
      <header class="top-bar">
        <div>
          <div class="room-title">Royal Auto CPM</div>
          <div class="room-subtitle">Anlık topluluk sohbeti (tarayıcı tabanlı demo)</div>
        </div>
        <div class="user-row">
          <input id="nameInput" type="text" maxlength="24" placeholder="Takma ad yaz..." />
          <button id="loginBtn">Sohbete Katıl</button>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <form id="chatForm" class="chat-input-row">
        <input id="msg" type="text" placeholder="Mesaj yaz..." autocomplete="off" required />
        <button type="submit">Gönder</button>
      </form>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
