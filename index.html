<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Auto CPM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="hero-img-wrap">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200&q=80" alt="Royal Auto CPM araç profil resmi" class="hero-img" />
      </div>
      <div>
        <p class="eyebrow">Royal Auto CPM</p>
        <h1>Asil Otomatik Sohbet</h1>
        <p class="subtitle">Royal Auto CPM ile akıcı ve modern sohbet deneyimi.</p>
      </div>
    </header>

    <main class="chat-card">
      <div class="rooms">
        <button class="room-btn active" data-room="genel">Genel Sohbet</button>
        <button class="room-btn" data-room="ilan">Araç İlan</button>
      </div>

      <section class="chat-body">
        <div class="room-header"><strong id="roomTitle">Genel Sohbet</strong></div>
        <div id="chatLog" class="chat-log" aria-live="polite"></div>
      </section>

      <form id="chatForm" class="input-row">
        <input id="messageInput" type="text" placeholder="Bir şeyler yaz..." autocomplete="off" required />
        <button type="submit">Gönder</button>
      </form>
    </main>

    <footer class="footer">
      <p>Kurucu: <strong>Royal Auto CPM</strong> • Herkes yazabilir ve sohbet edebilir.</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
