<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Auto CPM - Sohbet</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="logo">RAC</div>
      <div class="server-list"><div class="server-pill active">R</div></div>
      <div class="channels">
        <div class="section-title">KANALLAR</div>
        <button class="channel active" data-room="genel"># genel-sohbet</button>
        <button class="channel" data-room="ilan"># araç-ilan</button>
      </div>
    </aside>

    <main class="chat-panel">
      <header class="top-bar">
        <div>
          <div class="room-title">Royal Auto CPM</div>
          <div class="room-subtitle">Gerçek kullanıcı sohbet kanalı</div>
        </div>
        <div class="user-row">
          <label>Kullanıcı adı:</label>
          <input id="usernameInput" type="text" maxlength="20" placeholder="Adın..." />
        </div>
      </header>

      <section class="messages" id="chatLog"></section>

      <form id="chatForm" class="chat-input-row">
        <input id="messageInput" type="text" placeholder="Mesaj yaz..." autocomplete="off" required />
        <button type="submit">Gönder</button>
      </form>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
